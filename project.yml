# project.yml — xcodegen spec that produces an .xcodeproj
# whose sole job is hosting the SpooktacularUITests XCUITest
# bundle.
#
# Why this file exists:
#   SwiftPM can't declare UI-testing bundles with a launchable
#   app host (Apple's current limit — SwiftPM testTargets run
#   in-process, XCUITest needs a sibling .app target). The
#   workaround documented in Package.swift's SpooktacularUITests
#   comment is "xcodegen or tuist wiring." This is that wiring.
#
# What this generates:
#   - `Spooktacular.xcodeproj` with two targets:
#       1. `Spooktacular` — macOS .app bundle. Sources compiled
#          from `Sources/Spooktacular`. Depends on the
#          `SpooktacularKit` product from the root SwiftPM
#          package (`Package.swift`), so the business logic
#          doesn't duplicate across build systems.
#       2. `SpooktacularUITests` — XCUITest bundle. Sources from
#          `Tests/SpooktacularUITests`. Targets (`host app`) the
#          `Spooktacular` target.
#   - A scheme named `Spooktacular` that wires both targets into
#     the `test` action, so `xcodebuild test -scheme Spooktacular
#     -only-testing:SpooktacularUITests` works out of the box.
#
# What this does NOT replace:
#   - `build-app.sh` continues to drive production builds via
#     `swift build -c release` + manual bundle assembly. The
#     .xcodeproj is only used by `fastlane ui_tests` (local and
#     CI) to produce App Store screenshots.
#   - Package.swift is still the source of truth for every
#     library target (SpookCore, SpookApplication,
#     SpookInfrastructureApple, SpooktacularKit, spook CLI, etc.).
#
# Regenerating after edits to this file:
#   brew install xcodegen     # one-time
#   xcodegen generate
#   git add Spooktacular.xcodeproj project.yml && git commit
#
# The generated `.xcodeproj` is COMMITTED to the repo (not
# gitignored) so enterprise clients can `git clone && open
# Spooktacular.xcodeproj` in Xcode without installing an extra
# tool — zero-friction onboarding is a stated product requirement.
# The trade-off is PR noise in `project.pbxproj` when Xcode or
# xcodegen re-shuffles file lists; reviewers should focus on
# `project.yml` for the signal.
#
# The `:ui_tests` fastlane lane re-runs `xcodegen generate`
# before `xcodebuild test` so a forgotten regeneration
# (project.yml edited but .xcodeproj stale) doesn't go unnoticed —
# the lane will produce a diff against the committed project.
# CI can layer a `git diff --exit-code` check on top if drift
# becomes a recurring issue.

name: Spooktacular

options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 4AM5US9G8B
    ENABLE_HARDENED_RUNTIME: YES
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    # Manual signing so `fastlane match`-installed profiles are
    # usable on CI. Automatic signing requires an Apple ID
    # signed into Xcode.app Accounts pane — CI headless runners
    # don't have one and pass-through of App Store Connect API
    # credentials via `-authenticationKey*` flags still needs
    # automatic signing to consult an Xcode account first, which
    # isn't present. Manual signing bypasses the account lookup
    # entirely and points xcodebuild at the provisioning profile
    # by NAME (`match Development com.spooktacular.app macos` /
    # `match AppStore com.spooktacular.app macos`), which match
    # installs under
    # ~/Library/Developer/Xcode/UserData/Provisioning Profiles/.
    # Error we're avoiding:
    #   "No Accounts: Add a new account in Accounts settings.
    #    No profiles for 'com.spooktacular.app' were found:
    #    Xcode couldn't find any Mac App Development
    #    provisioning profiles matching 'com.spooktacular.app'."
    CODE_SIGN_STYLE: Manual

packages:
  SpooktacularPackage:
    path: .

targets:
  # Target is named `SpooktacularApp` (not `Spooktacular`) to
  # avoid a collision with the `Package.swift` executable target
  # also named `Spooktacular` that ships as part of the
  # `SpooktacularPackage` SPM dependency. When both exist under
  # the same name in the same `.xcodeproj`, Xcode routes build
  # output to the same DerivedData slot — the SPM executable
  # (bare binary) and the xcodegen app (wrapped in `.app/`) both
  # write to `Debug/Spooktacular`, corrupting each other.
  # Symptom: UITest runner crashes at launch with
  # "The bundle identifier for Spooktacular couldn't be read.
  #  No such file or directory: Debug/Spooktacular" — because
  # it's reading the SPM bare-executable path, not the `.app`.
  # Fix: keep the xcodegen target name unique, but override
  # `PRODUCT_NAME` so the shipped artifact is still
  # `Spooktacular.app` (what users install, what provisioning
  # profiles match, what App Store Connect expects).
  SpooktacularApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/Spooktacular
    resources:
      # Info.plist lives in Resources/ alongside AppIcon.icns but
      # is consumed via INFOPLIST_FILE below — exclude it from
      # the bundled-resources copy step so it doesn't land as a
      # loose file inside the .app alongside the real one Xcode
      # injects into the signature.
      - path: Resources
        excludes:
          - Info.plist
    dependencies:
      - package: SpooktacularPackage
        product: SpooktacularKit
    # NOTE: intentionally no `info:` or `entitlements:` keys.
    # Those directives tell xcodegen to GENERATE (and overwrite!)
    # the file — wiping our hand-authored `Resources/Info.plist`
    # and `Spooktacular.entitlements`. The `INFOPLIST_FILE` and
    # `CODE_SIGN_ENTITLEMENTS` build settings below point Xcode at
    # the existing files without touching them.
    settings:
      base:
        PRODUCT_NAME: Spooktacular
        PRODUCT_BUNDLE_IDENTIFIER: com.spooktacular.app
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Spooktacular.entitlements
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
      # Per-config signing identity. Debug is what the XCUITest
      # runner builds in; Release would be for a distributable
      # build (not actually used — build-app.sh drives those via
      # `swift build` + manual codesign). Both point at
      # match-managed profiles by the canonical match naming
      # convention `match <Type> <bundle_id> <platform>`.
      configs:
        Debug:
          PROVISIONING_PROFILE_SPECIFIER: match Development com.spooktacular.app macos
          CODE_SIGN_IDENTITY: Apple Development
        Release:
          PROVISIONING_PROFILE_SPECIFIER: match AppStore com.spooktacular.app macos
          CODE_SIGN_IDENTITY: Apple Distribution

  SpooktacularUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/SpooktacularUITests
    dependencies:
      - target: SpooktacularApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spooktacular.uitests
        TEST_TARGET_NAME: SpooktacularApp
        GENERATE_INFOPLIST_FILE: YES
        # XCUITest bundles don't need their OWN provisioning
        # profile (the test plugin and XCTRunner wrapper get
        # signed with the same identity as the host app), but
        # they do need `CODE_SIGN_IDENTITY` set to a real cert so
        # runner + plugin share a Team ID. Only Debug matters —
        # tests never run against Release.
      configs:
        Debug:
          CODE_SIGN_IDENTITY: Apple Development

schemes:
  # Named `SpooktacularApp` (not `Spooktacular`) to avoid a
  # collision with SwiftPM's auto-generated `Spooktacular` scheme
  # for the `.executableTarget(name: "Spooktacular")` in
  # `Package.swift`. With identical names, `xcodebuild -scheme
  # Spooktacular` would pick one non-deterministically (usually
  # the SPM one, which is a bare CLI executable without an
  # `.app` bundle — breaks UI test discovery with
  # "The bundle identifier for Spooktacular couldn't be read").
  SpooktacularApp:
    build:
      targets:
        SpooktacularApp: all
        SpooktacularUITests: [test]
    run:
      config: Debug
      executable: SpooktacularApp
    test:
      config: Debug
      targets:
        - SpooktacularUITests
