name: "✨ Feature Request"
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Spooktacular? We'd love to hear it. Enterprise use cases are prioritized.

  - type: textarea
    id: problem
    attributes:
      label: "🎯 What problem does this solve?"
      description: "Describe the use case. What are you trying to do that Spooktacular doesn't support yet?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "💡 Proposed solution"
      description: "How should it work? CLI flags, GUI behavior, API surface?"

  - type: textarea
    id: alternatives
    attributes:
      label: "🔄 Alternatives considered"
      description: "How are you working around this today?"

  - type: dropdown
    id: scope
    attributes:
      label: "📦 Which area?"
      options:
        - CLI (spook)
        - GUI (Spooktacular.app)
        - SpooktacularKit (core library)
        - Provisioning
        - Networking
        - Kubernetes / orchestration
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "🔥 How important is this to you?"
      options:
        - Nice to have
        - Important for my workflow
        - Blocking my adoption of Spooktacular
    validations:
      required: true
