name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test & Build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Run unit tests
        run: |
          swift test --parallel 2>&1 | tee test-output.txt
          grep "Test run with" test-output.txt

      - name: Build release binary
        run: swift build -c release

      - name: Build .app bundle
        run: |
          chmod +x build-app.sh
          ./build-app.sh release

      - name: Verify .app structure
        run: |
          test -f Spooktacular.app/Contents/Info.plist
          test -f Spooktacular.app/Contents/MacOS/Spooktacular
          test -f Spooktacular.app/Contents/MacOS/spook
          echo "✓ App bundle verified"
