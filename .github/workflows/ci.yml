name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        run: swift test

  build:
    name: Build
    runs-on: macos-15
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: swift build -c release

      - name: Build .app bundle
        run: |
          chmod +x build-app.sh
          ./build-app.sh release

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spooktacular.app
          path: Spooktacular.app
          retention-days: 7
