# CI runs on every PR against main and on every push to main.
#
# The pipeline is four parallel jobs, each a thin driver over
# Fastlane lanes or SwiftPM. No imperative shell logic lives here —
# anything worth reproducing on a contributor's laptop lives in
# the Fastfile or a script under `scripts/`.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# `pull-requests: write` and `issues: write` let Danger post
# inline review comments on the PR — without these, the default
# `GITHUB_TOKEN` on pull_request events is read-only and Danger
# fails with "Resource not accessible by integration".
# `contents: read` is the default but we list it explicitly so
# the `permissions` block fully describes the workflow's
# GitHub API scope (least-privilege is a reference-architecture
# posture, not a cut-and-paste default).
permissions:
  contents: read
  pull-requests: write
  issues: write

# Fastlane requires a UTF-8 locale on CI —
# https://docs.fastlane.tools/best-practices/continuous-integration/
env:
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

jobs:
  lint:
    name: Lint (SwiftLint + metadata)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
          swiftlint version

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      # `fastlane lint` wraps the `swiftlint` action (strict mode,
      # raise_if_swiftlint_error: true) so CI and a contributor's
      # laptop share one entry point. SwiftLint auto-discovers
      # both `.swiftlint.yml` and `Tests/.swiftlint.yml`.
      - name: fastlane lint
        run: bundle exec fastlane lint

      # Check App Store metadata on every PR so we never land a
      # commit that would fail `deliver` at release time.
      - name: fastlane lint_metadata
        run: bundle exec fastlane lint_metadata

      # Danger runs on pull_request events only — it needs a PR
      # context to post inline comments against. It applies the
      # strangler-pattern: strict force-unwrap / force-cast /
      # force-try rules are enforced on the PR diff so every
      # *new* violation fails the check, while baseline
      # violations in untouched code don't block.
      - name: fastlane pr_review (Danger)
        if: github.event_name == 'pull_request'
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bundle exec fastlane pr_review

  test-and-build:
    name: Test & Build
    runs-on: macos-26
    needs: [lint]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # Reads `.ruby-version`, installs that Ruby, reads
      # `Gemfile.lock`'s `BUNDLED WITH` to install the matching
      # Bundler, runs `bundle install`, caches gems.
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: fastlane test
        run: bundle exec fastlane test | tee test-output.txt

      - name: Build release binary
        run: swift build -c release

      - name: Build .app bundle
        run: |
          chmod +x build-app.sh
          ./build-app.sh release

      - name: Verify .app structure
        run: |
          test -f Spooktacular.app/Contents/Info.plist
          test -f Spooktacular.app/Contents/MacOS/Spooktacular
          test -f Spooktacular.app/Contents/MacOS/spook

      - name: Validate README claims against reality
        run: |
          chmod +x scripts/ci/validate-readme-claims.sh
          scripts/ci/validate-readme-claims.sh test-output.txt

  docs:
    name: DocC (warnings as errors)
    runs-on: macos-26
    needs: [lint]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Generate DocC
        run: |
          swift package generate-documentation \
            --target SpooktacularKit \
            --warnings-as-errors

  # Xcode scheme build + UI tests. The UI tests capture App Store
  # screenshots via `XCTAttachment` in ScreenshotTests.swift —
  # those come out inside the `.xcresult` bundle. We extract the
  # PNGs and upload them as a PR artifact so reviewers see the
  # shipping imagery without leaving GitHub.
  #
  # Xcode natively opens `Package.swift` as a workspace, so no
  # explicit `.xcodeproj` is required to build or test.
  xcode-and-ui-tests:
    name: Xcode + UI Tests + Screenshots
    runs-on: macos-26
    needs: [lint]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Generate Xcode helper output
        run: |
          chmod +x scripts/generate-xcode-project.sh
          ./scripts/generate-xcode-project.sh

      - name: Build Spooktacular scheme
        run: |
          xcodebuild \
            -scheme Spooktacular \
            -destination 'platform=macOS' \
            build

      # Drive tests through fastlane's `scan` action via a wrapper
      # lane so the result-bundle path + the PNG-extraction script
      # live next to every other lane. The lane writes to
      # `fastlane/test_output/` (scan default) and extracts
      # screenshots into `fastlane/screenshots/en-US/`.
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: fastlane ui_tests (UI tests + screenshot extraction)
        run: bundle exec fastlane ui_tests

      - name: Upload screenshots (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-pr-${{ github.event.pull_request.number }}
          path: fastlane/screenshots/en-US/
          if-no-files-found: warn
          retention-days: 14

      - name: Summarize screenshots on the Actions run
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "## 📸 Screenshots for PR #${{ github.event.pull_request.number }}"
            echo ""
            count=$(find fastlane/screenshots/en-US -maxdepth 1 -type f -name '*.png' 2>/dev/null | wc -l | tr -d ' ')
            if [ "$count" = "0" ]; then
              echo "_No screenshots were captured. Check the UI-test output above._"
            else
              echo "Captured **$count** screenshots. Download the **screenshots-pr-${{ github.event.pull_request.number }}** artifact from this run."
              echo ""
              find fastlane/screenshots/en-US -maxdepth 1 -type f -name '*.png' | sort | sed 's|^|- `|; s|$|`|'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
