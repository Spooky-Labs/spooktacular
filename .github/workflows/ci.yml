# CI runs on every PR against main and on every push to main.
#
# The pipeline is five parallel jobs, each a thin driver over
# Fastlane lanes or SwiftPM. No imperative shell logic lives here —
# anything worth reproducing on a contributor's laptop lives in
# the Fastfile or a script under `scripts/`.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# Fastlane documents this as required on every CI runner: the
# toolchain refuses to progress past match / pilot / deliver calls
# unless the locale is a UTF-8 one.
#
# https://docs.fastlane.tools/best-practices/continuous-integration/
env:
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

jobs:
  lint:
    name: SwiftLint (strict)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
          swiftlint version

      - name: Lint
        run: swiftlint --strict --config .swiftlint.yml

  test-and-build:
    name: Test & Build
    runs-on: macos-26
    needs: [lint]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # One action does four things: reads `.ruby-version`, installs
      # that Ruby, reads `Gemfile.lock`'s `BUNDLED WITH` to install
      # the matching Bundler, runs `bundle install`, caches gems.
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      # `fastlane test` owns the false-green guard (swift test exits
      # 0 on no-tests-ran after a compile crash) so the guard lives
      # in one place instead of every CI provider.
      - name: fastlane test
        run: bundle exec fastlane test | tee test-output.txt

      - name: Build release binary
        run: swift build -c release

      - name: Build .app bundle
        run: |
          chmod +x build-app.sh
          ./build-app.sh release

      - name: Verify .app structure
        run: |
          test -f Spooktacular.app/Contents/Info.plist
          test -f Spooktacular.app/Contents/MacOS/Spooktacular
          test -f Spooktacular.app/Contents/MacOS/spook

      - name: Validate README claims against reality
        run: |
          chmod +x scripts/ci/validate-readme-claims.sh
          scripts/ci/validate-readme-claims.sh test-output.txt

  docs:
    name: DocC (warnings as errors)
    runs-on: macos-26
    needs: [lint]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Generate DocC
        run: |
          swift package generate-documentation \
            --target SpooktacularKit \
            --warnings-as-errors

  xcode-and-ui-tests:
    name: Xcode + UI Tests
    runs-on: macos-26
    needs: [lint]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Generate Xcode helper output
        run: |
          chmod +x scripts/generate-xcode-project.sh
          ./scripts/generate-xcode-project.sh

      # Xcode opens Package.swift natively — no .xcodeproj needed.
      # This job catches the "builds with swift build but breaks in
      # Xcode" regression class.
      - name: Build Spooktacular scheme
        run: |
          xcodebuild \
            -scheme Spooktacular \
            -destination 'platform=macOS' \
            build

      - name: Run UI tests
        run: |
          xcodebuild \
            -scheme Spooktacular \
            -destination 'platform=macOS' \
            -only-testing:SpooktacularUITests \
            test

  # PR-only. Generates App Store imagery so reviewers can see the
  # shipping copy without leaving GitHub. Artifact retention is 14
  # days — long enough for review cycles, short enough to keep the
  # actions storage bill sane.
  screenshots:
    name: Screenshots
    if: github.event_name == 'pull_request'
    runs-on: macos-26
    needs: [lint]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: fastlane screenshots
        run: bundle exec fastlane screenshots

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-pr-${{ github.event.pull_request.number }}
          path: fastlane/screenshots/
          if-no-files-found: error
          retention-days: 14

      - name: Summarize on the Actions run
        run: |
          {
            echo "## 📸 Screenshots for PR #${{ github.event.pull_request.number }}"
            echo ""
            echo "Download **screenshots-pr-${{ github.event.pull_request.number }}** from this run's Artifacts."
            echo ""
            find fastlane/screenshots -maxdepth 3 -type f \( -name '*.png' -o -name '*.jpg' \) | sort | sed 's|^|- `|; s|$|`|'
          } >> "$GITHUB_STEP_SUMMARY"
