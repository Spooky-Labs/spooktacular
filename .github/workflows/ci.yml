name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Tests (Swift Testing)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        run: swift test --parallel

      - name: Verify test count
        run: |
          swift test 2>&1 | grep "Test run with" | tee test-summary.txt
          echo "---"
          cat test-summary.txt

  build:
    name: Build App Bundle
    runs-on: macos-15
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Build .app bundle
        run: |
          chmod +x build-app.sh
          ./build-app.sh release

      - name: Verify .app structure
        run: |
          test -f Spooktacular.app/Contents/Info.plist
          test -f Spooktacular.app/Contents/MacOS/Spooktacular
          test -f Spooktacular.app/Contents/MacOS/spook
          echo "✓ App bundle structure verified"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spooktacular.app
          path: Spooktacular.app
          retention-days: 14

  screenshots:
    name: UI Tests + Screenshots (XCUITest)
    runs-on: macos-15
    needs: build
    # Only run on main branch and PRs (not every feature push)
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Build .app bundle
        run: |
          chmod +x build-app.sh
          ./build-app.sh release

      - name: Capture screenshots
        run: |
          chmod +x scripts/capture-screenshots.sh
          ./scripts/capture-screenshots.sh || echo "Screenshot capture requires interactive session — skipping automated capture"

      - name: Process screenshots for App Store
        run: |
          chmod +x scripts/process-screenshots.sh
          ./scripts/process-screenshots.sh || echo "No raw screenshots to process"

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: fastlane/screenshots/
          retention-days: 14

  # DocC generation + deployment is handled by docs.yml on push to main.
