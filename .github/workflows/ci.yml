# CI runs on every PR against main and on every push to main.
#
# The pipeline is three jobs, each a thin driver over Fastlane
# lanes or SwiftPM: `lint` runs first, then `test-and-build` and
# `xcode-build` run in parallel once it passes. No imperative
# shell logic lives here — anything worth reproducing on a
# contributor's laptop lives in the Fastfile or a script under
# `scripts/`.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# `pull-requests: write` and `issues: write` let Danger post
# inline review comments on the PR — without these, the default
# `GITHUB_TOKEN` on pull_request events is read-only and Danger
# fails with "Resource not accessible by integration".
# `contents: read` is the default but we list it explicitly so
# the `permissions` block fully describes the workflow's
# GitHub API scope (least-privilege is a reference-architecture
# posture, not a cut-and-paste default).
permissions:
  contents: read
  pull-requests: write
  issues: write

# Fastlane requires a UTF-8 locale on CI —
# https://docs.fastlane.tools/best-practices/continuous-integration/
env:
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

jobs:
  lint:
    name: Lint (SwiftLint + metadata)
    runs-on: macos-26
    steps:
      # `fetch-depth: 0` pulls the full history — Danger computes
      # a diff between `danger_base` (main) and `danger_head` (the
      # PR tip) via `git merge-base`, which silently fails on the
      # default depth-1 shallow clone with
      #   "Cannot find a merge base between danger_base and
      #    danger_head. If you are using shallow clone/fetch,
      #    try increasing the --depth"
      # and returns exit 1, which Danger's --fail-on-errors flips
      # into a build failure.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
          swiftlint version

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      # `fastlane lint` wraps the `swiftlint` action (strict mode,
      # raise_if_swiftlint_error: true) so CI and a contributor's
      # laptop share one entry point. SwiftLint auto-discovers
      # both `.swiftlint.yml` and `Tests/.swiftlint.yml`.
      - name: fastlane lint
        run: bundle exec fastlane lint

      # Check App Store metadata on every PR so we never land a
      # commit that would fail `deliver` at release time.
      - name: fastlane lint_metadata
        run: bundle exec fastlane lint_metadata

      # Danger runs on pull_request events only — it needs a PR
      # context to post inline comments against. It applies the
      # strangler-pattern: strict force-unwrap / force-cast /
      # force-try rules are enforced on the PR diff so every
      # *new* violation fails the check, while baseline
      # violations in untouched code don't block.
      - name: fastlane pr_review (Danger)
        if: github.event_name == 'pull_request'
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bundle exec fastlane pr_review

  test-and-build:
    name: Test & Build
    runs-on: macos-26
    needs: [lint]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # ── macOS 27 SDK gate ─────────────────────────────────
      # `VZMacGuestProvisioningOptions` (native guest
      # provisioning) exists only in the macOS 27 SDK, so the
      # package no longer compiles against Xcode 26.x. GitHub-
      # hosted images currently top out at Xcode 26 — there is
      # no macos-27 image yet. Until one ships, this gate
      # selects Xcode 27 when the runner has it and otherwise
      # skips the SDK-dependent steps LOUDLY (warning
      # annotation) while letting the job pass, so Lint + SBOM
      # keep gating PRs and main stays green. The moment the
      # image ships any Xcode_27*.app, these steps resume
      # automatically — delete this gate once that's the
      # baseline. Until then the full suite is run locally
      # before merge via `bundle exec fastlane test`.
      - name: Select Xcode 27 (or skip — macOS 27 SDK required)
        id: xcode27
        run: |
          XCODE27="$(ls -d /Applications/Xcode_27*.app 2>/dev/null | sort -V | tail -1 || true)"
          if [ -n "$XCODE27" ]; then
            sudo xcode-select -s "$XCODE27/Contents/Developer"
            xcodebuild -version
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning title=Skipped — macOS 27 SDK unavailable::Native guest provisioning requires the macOS 27 SDK; this runner image tops out at Xcode 26.x. Build/test steps skipped (Lint + SBOM still gate). Full suite runs locally via 'bundle exec fastlane test' before merge. Steps resume automatically once the image ships Xcode 27."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      # Reads `.ruby-version`, installs that Ruby, reads
      # `Gemfile.lock`'s `BUNDLED WITH` to install the matching
      # Bundler, runs `bundle install`, caches gems.
      - uses: ruby/setup-ruby@v1
        if: steps.xcode27.outputs.available == 'true'
        with:
          bundler-cache: true

      - name: fastlane test
        if: steps.xcode27.outputs.available == 'true'
        run: bundle exec fastlane test | tee test-output.txt

      - name: Build release binary
        if: steps.xcode27.outputs.available == 'true'
        run: swift build -c release

      - name: Build .app bundle
        if: steps.xcode27.outputs.available == 'true'
        run: |
          chmod +x build-app.sh
          ./build-app.sh release

      - name: Verify .app structure
        if: steps.xcode27.outputs.available == 'true'
        run: |
          test -f Spooktacular.app/Contents/Info.plist
          test -f Spooktacular.app/Contents/MacOS/Spooktacular
          test -f Spooktacular.app/Contents/MacOS/spook

      - name: Validate README claims against reality
        if: steps.xcode27.outputs.available == 'true'
        run: |
          chmod +x scripts/ci/validate-readme-claims.sh
          scripts/ci/validate-readme-claims.sh test-output.txt

  # Xcode scheme build + SpooktacularUITests compile-check.
  #
  # Runs two build passes:
  #
  # 1. `xcodebuild -scheme Spooktacular build` — catches the
  #    "builds with `swift build` but breaks in Xcode"
  #    regression class. Xcode opens `Package.swift` as a
  #    workspace, so no separate `.xcodeproj` is needed.
  #
  # 2. `swift build --target SpooktacularUITests` — compile-
  #    checks the XCUITest bundle declared in `Package.swift`.
  #    Catches SwiftUI API changes, accessibility-identifier
  #    renames, and XCTest-API drift without actually running
  #    the UI tests.
  #
  # Actually RUNNING the UI tests (and producing screenshots
  # for PR artifacts) requires a proper `.xcodeproj` with a
  # "UI Testing Bundle" target — SwiftPM can't host one per
  # Apple's current limit, and `scan`/`xcodebuild test`
  # fail in non-interactive CI without a real scheme.
  # Re-add the runtime lane when the .xcodeproj story is in
  # place.
  xcode-build:
    name: Xcode build + UI-test compile-check
    runs-on: macos-26
    needs: [lint]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Same macOS 27 SDK gate as `test-and-build` — see the
      # comment there. Delete both once GitHub images ship
      # Xcode 27.
      - name: Select Xcode 27 (or skip — macOS 27 SDK required)
        id: xcode27
        run: |
          XCODE27="$(ls -d /Applications/Xcode_27*.app 2>/dev/null | sort -V | tail -1 || true)"
          if [ -n "$XCODE27" ]; then
            sudo xcode-select -s "$XCODE27/Contents/Developer"
            xcodebuild -version
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning title=Skipped — macOS 27 SDK unavailable::Native guest provisioning requires the macOS 27 SDK; this runner image tops out at Xcode 26.x. Xcode-scheme + UI-test compile checks skipped. They resume automatically once the image ships Xcode 27."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Spooktacular scheme via Xcode
        if: steps.xcode27.outputs.available == 'true'
        run: |
          xcodebuild \
            -scheme Spooktacular \
            -destination 'platform=macOS' \
            build

      - name: Compile-check SpooktacularUITests (SwiftPM)
        if: steps.xcode27.outputs.available == 'true'
        run: swift build --target SpooktacularUITests
