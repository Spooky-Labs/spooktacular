name: Release (App Store)

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Notarize & Publish
    runs-on: macos-26
    permissions:
      contents: write
    env:
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Fastlane
        run: gem install fastlane

      # 1. Tests — same code that was already tested on main,
      #    but verify nothing broke between merge and tag
      - name: Run tests
        run: swift test --parallel

      # 2. Sign
      - name: Sync code signing via match
        run: fastlane signing
        working-directory: fastlane

      # 3. Build with version from tag
      - name: Build signed .app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MARKETING_VERSION="$VERSION" \
          BUILD_NUMBER="${{ github.run_number }}" \
          fastlane build
        working-directory: fastlane

      # 4. Notarize with xcrun notarytool (not Fastlane)
      - name: Write API key to disk
        run: echo "$APPLE_API_KEY_P8" | base64 --decode > /tmp/AuthKey.p8

      - name: Notarize .app
        run: |
          ditto -c -k --sequesterRsrc --keepParent Spooktacular.app Spooktacular.app.zip
          xcrun notarytool submit Spooktacular.app.zip \
            --key /tmp/AuthKey.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

      - name: Staple notarization ticket
        run: xcrun stapler staple Spooktacular.app

      # 5. Re-zip after stapling
      - name: Create notarized zip
        run: |
          rm -f Spooktacular.app.zip
          ditto -c -k --sequesterRsrc --keepParent Spooktacular.app Spooktacular.app.zip

      # 6. Package .pkg for App Store
      - name: Package .pkg
        run: fastlane package
        working-directory: fastlane

      # 7. GitHub Release with notarized zip
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Spooktacular $GITHUB_REF_NAME" \
            --generate-notes \
            Spooktacular.app.zip

      # 8. Submit to App Store (promote from TestFlight)
      - name: Submit to App Store
        continue-on-error: true
        run: |
          fastlane run upload_to_testflight \
            pkg:"Spooktacular.pkg" \
            app_platform:"osx" \
            skip_waiting_for_build_processing:true
        working-directory: fastlane

      - name: Cleanup
        if: always()
        run: rm -f /tmp/AuthKey.p8
