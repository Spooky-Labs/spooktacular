name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.0)'
        required: true
        type: string

jobs:
  release:
    name: Test → Build → Notarize → Release
    runs-on: macos-26
    permissions:
      contents: write
    env:
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
    steps:
      - uses: actions/checkout@v5

      # 1. Run all tests first — fail fast before any signing
      - name: Run tests
        run: swift test --parallel

      # 2. Install Fastlane and sync code signing
      - name: Install Fastlane
        run: gem install fastlane

      - name: Sync code signing via match
        run: fastlane signing
        working-directory: fastlane

      # 3. Build the signed .app bundle
      - name: Build signed .app bundle
        run: |
          MARKETING_VERSION="${{ inputs.version }}" \
          BUILD_NUMBER="${{ github.run_number }}" \
          fastlane build
        working-directory: fastlane

      # 4. Notarize with xcrun notarytool (not Fastlane — their wrapper is broken)
      - name: Write API key to disk
        run: |
          echo "$APPLE_API_KEY_P8" | base64 --decode > /tmp/AuthKey.p8

      - name: Notarize .app
        run: |
          ditto -c -k --sequesterRsrc --keepParent Spooktacular.app Spooktacular.app.zip
          xcrun notarytool submit Spooktacular.app.zip \
            --key /tmp/AuthKey.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

      - name: Staple notarization ticket
        run: xcrun stapler staple Spooktacular.app

      # 5. Re-zip after stapling (the stapled ticket is now inside the .app)
      - name: Create final zip
        run: |
          rm -f Spooktacular.app.zip
          ditto -c -k --sequesterRsrc --keepParent Spooktacular.app Spooktacular.app.zip

      # 6. Package .pkg for TestFlight/App Store
      - name: Package .pkg
        run: fastlane package
        working-directory: fastlane

      # 7. Create git tag (CI creates it, not a human)
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      # 8. Create GitHub Release with the notarized zip
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "Spooktacular v${{ inputs.version }}" \
            --generate-notes \
            Spooktacular.app.zip

      # 9. Upload to TestFlight
      - name: Upload to TestFlight
        continue-on-error: true
        run: |
          fastlane run upload_to_testflight \
            api_key_path:"" \
            pkg:"Spooktacular.pkg" \
            app_platform:"osx" \
            skip_waiting_for_build_processing:true
        working-directory: fastlane

      # 10. Cleanup
      - name: Cleanup API key
        if: always()
        run: rm -f /tmp/AuthKey.p8
