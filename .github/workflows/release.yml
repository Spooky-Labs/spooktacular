name: Release (App Store)

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Notarize & Publish
    runs-on: macos-26
    permissions:
      contents: write
    env:
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 1. Tests — verify nothing broke between merge and tag
      - name: Run tests
        run: swift test --parallel

      # 2. Install Fastlane via Bundler (Gemfile at project root)
      - name: Install dependencies
        run: bundle install

      # 3. Sign
      - name: Sync code signing
        run: bundle exec fastlane signing

      # 4. Build with version from tag
      - name: Build signed .app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MARKETING_VERSION="$VERSION" \
          BUILD_NUMBER="${{ github.run_number }}" \
          bundle exec fastlane build

      # 5. Notarize via Fastlane (wraps notarytool, handles stapling)
      - name: Notarize .app
        run: bundle exec fastlane notarize_app

      # 6. Create notarized zip for GitHub Release
      - name: Create notarized zip
        run: ditto -c -k --sequesterRsrc --keepParent Spooktacular.app Spooktacular.app.zip

      # 7. Package .pkg for App Store
      - name: Package .pkg
        run: bundle exec fastlane package

      # 8. GitHub Release with notarized zip
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Spooktacular $GITHUB_REF_NAME" \
            --generate-notes \
            Spooktacular.app.zip

      # 9. Submit to App Store
      - name: Submit to App Store
        continue-on-error: true
        run: |
          bundle exec fastlane run upload_to_testflight \
            pkg:"$PWD/Spooktacular.pkg" \
            app_platform:"osx" \
            skip_waiting_for_build_processing:true
