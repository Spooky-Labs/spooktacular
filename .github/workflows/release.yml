# A tag push triggers two parallel distribution channels:
#
#   1. App Store — `fastlane promote` submits the existing
#      TestFlight build for App Store review. No rebuild —
#      `deliver(skip_binary_upload: true)` promotes the exact
#      bits beta testers have already validated.
#
#   2. GitHub Release — `fastlane homebrew` builds + notarizes
#      a fresh zip for the Homebrew cask and direct downloads,
#      with SLSA build provenance and an SBOM attached at the
#      same revision.
#
# Both channels derive the version from the pushed tag.
name: Release (App Store + GitHub)

on:
  push:
    tags: ["v*"]

defaults:
  run:
    shell: bash

env:
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

jobs:
  promote:
    name: Promote TestFlight → App Store
    runs-on: macos-26
    env:
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Belt + braces before we tell Apple "submit this for
      # review": re-check the metadata against Apple's rules so a
      # stale release note or a prohibited word doesn't fail the
      # deliver call halfway through.
      - name: fastlane lint_metadata
        run: bundle exec fastlane lint_metadata

      - name: fastlane promote
        run: |
          bundle exec fastlane promote \
            version:"${{ steps.version.outputs.version }}"

  github-release:
    name: GitHub Release (notarized + SBOM)
    runs-on: macos-26
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync code signing
        run: bundle exec fastlane signing

      - name: fastlane homebrew (build + notarize + zip)
        env:
          MARKETING_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: bundle exec fastlane homebrew

      # Belt + braces after Fastlane's notarize_app: assert the
      # invariants an auditor cares about. `fastlane notarize_app`
      # downgrades some stapler non-zero exits to warnings.
      - name: Verify signature + stapled ticket
        run: |
          codesign -v --verbose=4 Spooktacular.app
          xcrun stapler validate Spooktacular.app

      - name: Attest build provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: Spooktacular.app.zip

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          artifact-name: spooktacular-sbom.spdx.json
          output-file: spooktacular-sbom.spdx.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Spooktacular $GITHUB_REF_NAME" \
            --generate-notes \
            Spooktacular.app.zip \
            spooktacular-sbom.spdx.json
