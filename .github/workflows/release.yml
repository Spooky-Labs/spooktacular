name: Release (App Store)

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Build & Submit to App Store
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      - name: Build .app bundle
        run: |
          chmod +x build-app.sh
          ./build-app.sh release

      - name: Package for distribution
        run: |
          ditto -c -k --sequesterRsrc --keepParent Spooktacular.app Spooktacular.app.zip

      - name: Install Fastlane
        run: gem install fastlane

      - name: Submit to App Store
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: fastlane release submit:true
        working-directory: fastlane

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "Spooktacular $TAG_NAME" \
            --generate-notes \
            Spooktacular.app.zip
