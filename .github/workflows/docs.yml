name: Documentation

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs
  cancel-in-progress: true

jobs:
  docs:
    name: Build & Deploy DocC + Site
    runs-on: macos-26
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Generate DocC static documentation
        run: |
          chmod +x scripts/build-docs.sh
          ./scripts/build-docs.sh --static

      - name: Verify DocC output
        run: |
          test -d docs/api
          echo "✓ DocC generated at docs/api/"

      - name: Commit DocC to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/
          git diff --cached --quiet && echo "No DocC changes" || {
            git commit -m "docs: auto-generate DocC API reference [skip ci]"
            git push
          }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
