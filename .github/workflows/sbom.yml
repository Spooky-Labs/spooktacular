name: SBOM

on:
  release:
    types: [published]

jobs:
  sbom:
    name: Generate SBOM
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: anchore/sbom-action@v0
        with:
          artifact-name: spooktacular-sbom.spdx.json
          output-file: spooktacular-sbom.spdx.json
      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG_NAME" spooktacular-sbom.spdx.json
