name: SBOM (PR smoke test)

# Release-time SBOM generation moved into release.yml so the
# SBOM is attached to the GitHub Release in the SAME call as
# the signed zip — downstream scanners previously missed the
# first hours of distribution because this workflow fired on
# release-published, AFTER consumers had already pulled the
# binary. Retained here on PRs only as a smoke test: verifies
# the SBOM generator still produces valid SPDX against the
# current dependency graph so breakage does not hide until a
# tag push.

on:
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

jobs:
  sbom-smoke:
    name: Generate SBOM (smoke)
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          artifact-name: spooktacular-sbom.spdx.json
          output-file: spooktacular-sbom.spdx.json
      - name: Verify SBOM is valid SPDX JSON
        run: |
          set -Eeuo pipefail
          test -s spooktacular-sbom.spdx.json
          python3 -c 'import json; json.load(open("spooktacular-sbom.spdx.json"))'
