name: Beta (TestFlight)

on:
  push:
    branches: [main]

concurrency:
  group: beta
  cancel-in-progress: true

jobs:
  testflight:
    name: Build & Upload to TestFlight
    runs-on: macos-26
    env:
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: bundle install

      - name: Sync code signing
        run: bundle exec fastlane signing

      - name: Build signed .app
        run: BUILD_NUMBER="${{ github.run_number }}" bundle exec fastlane build

      - name: Package .pkg
        run: bundle exec fastlane package

      - name: Upload to TestFlight
        run: |
          bundle exec fastlane run upload_to_testflight \
            pkg:"$PWD/Spooktacular.pkg" \
            app_platform:"osx" \
            skip_waiting_for_build_processing:true
