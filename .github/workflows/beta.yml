# Every merge to main becomes a TestFlight build.
#
# The `:beta` lane in fastlane/Fastfile owns the sequence —
# test → signing → build → package → pilot — with the full
# TestFlight metadata (changelog, beta review info, localized
# copy). This workflow is a thin driver: one checkout, one
# Ruby+Bundler setup, one `bundle exec fastlane beta`.
name: Beta (TestFlight)

on:
  push:
    branches: [main]

concurrency:
  group: beta
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  # Fastlane requires a UTF-8 locale on CI —
  # https://docs.fastlane.tools/best-practices/continuous-integration/
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

jobs:
  testflight:
    name: TestFlight
    runs-on: macos-26
    env:
      # App Store Connect API key (bypasses 2FA interactively).
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      # match password + Git auth for the cert repo.
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      # Beta-review contact fields. Apple rejects obvious placeholders
      # (`+1 (555) 000-0000`, fictional emails) server-side, so at
      # least the phone must be a real reachable number. Other
      # contact fields have sane defaults in Fastfile; override via
      # matching FASTLANE_CONTACT_* secrets when needed.
      FASTLANE_CONTACT_PHONE: ${{ secrets.FASTLANE_CONTACT_PHONE }}
      # build-app.sh reads BUILD_NUMBER for CFBundleVersion.
      # github.run_number is monotonic, collision-free, and numeric
      # — unlike the commit SHA, which wouldn't parse.
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # Full history so `git log` can populate the changelog
          # and match's Git remote can cache-resolve.
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      # Use the merge commit body as the TestFlight "What to Test"
      # note. Capped at 3,600 chars (below Apple's limit, with UTF-8
      # headroom).
      - name: Extract changelog
        id: changelog
        run: |
          MSG=$(git log -1 --pretty=format:%B | head -c 3600)
          {
            echo 'changelog<<CHANGELOG_EOF'
            printf '%s\n' "$MSG"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: fastlane beta
        env:
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: bundle exec fastlane beta changelog:"${CHANGELOG}"

  # Runs the XCUITest screenshot lane on every merge to `main`,
  # in parallel with the TestFlight upload. Purpose: catch UI
  # regressions early — if the screenshot generation breaks on
  # `main`, we find out now, not when someone tags `vX.Y.Z` and
  # `release.yml`'s `promote` job fails mid-submission.
  #
  # Screenshots are uploaded as a workflow artifact (30-day
  # retention) so reviewers can sanity-check the rendering
  # without cloning the repo. They're NOT committed back to
  # the repo — `release.yml` regenerates fresh on tag push so
  # the App Store artwork always matches the tagged binary.
  ui-tests:
    name: UI Tests (screenshots)
    runs-on: macos-26
    env:
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      # match provides the real Apple Development cert needed for
      # the XCUITest runner + plugin to share a Team ID. Without
      # it, ad-hoc signing produces mismatched hashes and the test
      # runner aborts with "mapping process and mapped file (non-
      # platform) have different Team IDs" before any test runs.
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install xcodegen
        run: brew install xcodegen

      - name: fastlane ui_tests
        run: bundle exec fastlane ui_tests

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-store-screenshots
          path: fastlane/screenshots/en-US/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload .xcresult bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: uitest-xcresult
          path: fastlane/test_output/*.xcresult
          retention-days: 7
          if-no-files-found: ignore
