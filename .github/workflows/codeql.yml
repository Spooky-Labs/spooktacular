name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: codeql-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # `build-mode: manual` per GitHub's documented fallback
      # when autobuild fails with "We were unable to
      # automatically build your code" —
      # https://github.com/actions/starter-workflows/blob/main/code-scanning/codeql.yml
      # states: "If the analyze step fails for one of the
      # languages you are analyzing with 'We were unable to
      # automatically build your code', modify the matrix above
      # to set the build mode to 'manual' for that language."
      #
      # CodeQL's Swift autobuild is documented to search only
      # for an Xcode project or workspace —
      # https://docs.github.com/en/code-security/reference/code-scanning/codeql/codeql-build-options-and-steps-for-compiled-languages.
      # This repo is SwiftPM-only (`Package.swift`, no
      # `.xcodeproj`), so autobuild can't find a target and
      # falls back to a partial `swift build` that doesn't link
      # Apple's Virtualization framework correctly.
      #
      # The manual build step below runs the same `swift build`
      # the `Test & Build` job already runs successfully on
      # every PR — same runner, same SDK, same toolchain. This
      # is the canonical pattern GitHub's starter workflow
      # publishes for "autobuild didn't work, here's the
      # manual equivalent."
      - name: Initialize CodeQL
        uses: github/codeql-action/init@865f5f5c36632f18690a3d569fa0a764f2da0c3e # v3
        with:
          languages: swift
          build-mode: manual

      # Use `xcodebuild` rather than `swift build` here, even
      # though they both drive the same toolchain, because
      # `xcodebuild` sets `SDKROOT` per the scheme's deployment
      # target (macOS 14+). Under CodeQL's extractor, naked
      # `swift build` picks up a stale SDK where
      # `VZMacMachineIdentifier` (added in macOS 13) isn't
      # visible — producing ~100 "cannot find in scope" errors
      # while the `Xcode build` CI job runs the same command
      # against the same macOS 26 runner cleanly. Matches the
      # canonical SwiftPM-on-macOS manual-build pattern per
      # https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift.
      #
      # Three CodeQL-specific hardeners on the command:
      #
      # `clean build` — CodeQL's extractor intercepts compiler
      # invocations; an incremental build that reuses cached
      # `.o` files emits zero invocations for those files and
      # CodeQL reports them as "Not Extracted." Forcing a full
      # recompile guarantees the extractor sees every Swift
      # source.
      #
      # `CODE_SIGNING_ALLOWED=NO` — CodeQL's init wrapper is a
      # documented source of CodeSign failures in Swift CI
      # pipelines. Analysis doesn't need a signed binary, so we
      # strip the signing step entirely and avoid the class of
      # failures where the extractor environment mismatches
      # the runner's Keychain.
      #
      # `-skipMacroValidation` — Swift 5.9+ macro packages
      # prompt for trust outside a TTY; skipping validation
      # prevents a silent hang during CodeQL's non-interactive
      # run.
      - name: Build for CodeQL (manual build mode)
        run: |
          xcodebuild \
            -scheme Spooktacular \
            -destination 'platform=macOS' \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@865f5f5c36632f18690a3d569fa0a764f2da0c3e # v3
        with:
          category: "/language:swift"
