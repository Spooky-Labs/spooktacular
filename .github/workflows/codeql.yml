name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: codeql-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: none
          # Analyze source directly without a traced build.
          # The Infrastructure/ layer imports Apple system frameworks
          # (Virtualization, Network, Security) that CodeQL's Swift
          # extractor cannot resolve. The security-critical code lives
          # in Entities/, UseCases/, and Interfaces/ — all pure
          # Foundation, fully analyzable without a build.

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"
