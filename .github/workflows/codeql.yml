name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: codeql-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual

      - name: Build for CodeQL
        run: |
          # Use xcodebuild instead of swift build — CodeQL's DYLD tracer
          # conflicts with SwiftPM's plugin system, causing hangs.
          # xcodebuild can build SwiftPM packages directly.
          xcodebuild build \
            -scheme SpooktacularKit \
            -destination 'platform=macOS' \
            -derivedDataPath .build/xcode \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -20

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"
