# =============================================================================
# Spooktacular Helm Chart — Default Values
# =============================================================================
#
# Override these values by passing --set flags or a custom values.yaml file
# when installing the chart:
#
#   helm install spooktacular ./deploy/kubernetes/helm/spooktacular \
#     --set controller.image.tag=v0.2.0 \
#     --set macNodes[0].name=mac-mini-01 \
#     --set macNodes[0].endpoint=https://192.168.1.50:8484
#
# =============================================================================

# -----------------------------------------------------------------------------
# Controller Deployment
# -----------------------------------------------------------------------------
controller:
  # Container image for the Spooktacular K8s controller.
  image:
    repository: ghcr.io/spooktacular/controller
    tag: ""  # Defaults to appVersion from Chart.yaml if empty.
    pullPolicy: IfNotPresent

  # Number of controller replicas. Defaults to 2 so a voluntary
  # disruption (node drain, upgrade) doesn't take the admission
  # webhook offline. Leader election keeps only one replica active
  # at a time.
  replicas: 2

  # Resource requests and limits for the controller pod.
  #
  # Tuning rule of thumb: add +10m CPU and +5Mi memory per 100 VMs
  # actively managed by the controller. The defaults below are sized
  # for a ~200-VM fleet with comfortable headroom; under-allocating
  # requests causes the scheduler to pack the controller onto hot
  # nodes and risk OOMKill during reconcile storms.
  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi

  # Node selector for the controller pod. The controller runs on Linux.
  nodeSelector:
    kubernetes.io/os: linux

  # Tolerations for the controller pod.
  tolerations: []

  # Pod-level security context.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  # Container-level security context.
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  # Leader election settings for high-availability deployments.
  leaderElection:
    enabled: true
    # Lease duration before a new leader can be elected.
    leaseDuration: 15s
    renewDeadline: 10s
    retryPeriod: 2s

  # Logging configuration.
  logLevel: info  # debug, info, warn, error

  # How often the controller reconciles all MacOSVM resources (seconds).
  reconcileInterval: 30

  # Timeout for HTTP calls to Mac nodes (seconds).
  nodeTimeout: 30

# -----------------------------------------------------------------------------
# Mac Node Endpoints
# -----------------------------------------------------------------------------
# Each Mac node runs `spook serve` as a LaunchDaemon. The controller needs to
# know how to reach each node. In production, consider using a service
# discovery mechanism instead of static endpoints.
#
# Example:
#   macNodes:
#     - name: mac-mini-01
#       endpoint: https://192.168.1.50:8484
#       labels:
#         spooktacular.app/pool: ci
#         spooktacular.app/gpu: "true"
#     - name: mac-studio-01
#       endpoint: https://192.168.1.51:8484
#       labels:
#         spooktacular.app/pool: desktop
macNodes: []

# -----------------------------------------------------------------------------
# TLS Configuration
# -----------------------------------------------------------------------------
# TLS settings for communication between the controller and Mac nodes.
tls:
  # Enable TLS for controller-to-node communication. Strongly recommended
  # for production. Set to false only for local development.
  enabled: true

  # Name of an existing Secret containing TLS certificates.
  # The Secret should have keys: ca.crt, tls.crt, tls.key
  existingSecret: ""

  # If not using an existing secret, the chart can reference cert-manager.
  certManager:
    enabled: false
    issuerRef:
      name: ""
      kind: ClusterIssuer

# -----------------------------------------------------------------------------
# RBAC
# -----------------------------------------------------------------------------
rbac:
  # Create ClusterRole and ClusterRoleBinding for the controller.
  create: true

# -----------------------------------------------------------------------------
# Service Account
# -----------------------------------------------------------------------------
serviceAccount:
  # Create a ServiceAccount for the controller.
  create: true
  # Name of the ServiceAccount. Auto-generated if empty.
  name: ""
  # Annotations to add to the ServiceAccount (e.g., for IRSA on EKS).
  annotations: {}

# -----------------------------------------------------------------------------
# Service
# -----------------------------------------------------------------------------
# The controller exposes a metrics and health endpoint.
service:
  type: ClusterIP
  port: 8080
  # Annotations for the service (e.g., for Prometheus scraping).
  annotations: {}

# -----------------------------------------------------------------------------
# Monitoring
# -----------------------------------------------------------------------------
metrics:
  # Enable Prometheus metrics endpoint on the controller.
  enabled: true
  port: 8081

  # Create a ServiceMonitor for Prometheus Operator.
  serviceMonitor:
    enabled: false
    interval: 30s
    namespace: ""
    additionalLabels: {}

  # Install a Grafana dashboard ConfigMap.
  #
  # When true, creates a ConfigMap labeled `grafana_dashboard=1` that
  # the Grafana sidecar picks up automatically (kube-prometheus-stack
  # and most Grafana installs with the dashboard sidecar enabled).
  grafana:
    enabled: false

  # Default alert rules bundled as a PrometheusRule CRD.
  prometheusRule:
    enabled: false
    # Namespace for the PrometheusRule (defaults to release namespace).
    namespace: ""
    # Extra labels to assist Prometheus `ruleSelector` matchers.
    additionalLabels: {}
    # Seconds remaining below which SpooktacularTLSCertExpiringSoon fires.
    # Default: 7 days.
    tlsExpirySecondsThreshold: 604800
    # Additional PromQL rules appended after the defaults.
    additionalRules: []

# -----------------------------------------------------------------------------
# Admission Webhook
# -----------------------------------------------------------------------------
# Ships a `ValidatingWebhookConfiguration` that enforces cross-tenant
# isolation and the 2-VM-per-host Apple Silicon limit. Fail-closed
# (failurePolicy=Fail) is the secure default: if the webhook is
# unreachable, CREATE/UPDATE on MacOSVM and RunnerPool is rejected.
admissionWebhook:
  enabled: true
  # Port inside the controller pod where the admission HTTPS server listens.
  port: 9443
  # Webhook request timeout (seconds). Must be <= 30.
  timeoutSeconds: 5
  # "Fail" = reject if webhook unreachable. "Ignore" = silently allow (less
  # secure, only for migration scenarios).
  failurePolicy: Fail

# -----------------------------------------------------------------------------
# NetworkPolicy
# -----------------------------------------------------------------------------
# Restricts controller pod ingress/egress to the minimum required for:
#   - Admission webhook from kube-apiserver
#   - Prometheus scrape
#   - Kubelet probes
#   - DNS, K8s API, Mac node HTTPS
networkPolicy:
  enabled: true
  # Namespace label (metadata.name) of the Prometheus installation.
  # Empty = allow scrape from any namespace.
  prometheusNamespace: ""
  # CIDR for Mac host nodes. Used for egress to `spook serve` on each
  # Mac. Empty / "0.0.0.0/0" allows all (tighten in production).
  macNodeCIDR: ""
  # Port on Mac hosts running `spook serve`.
  macNodePort: 8484
  # Whether to allow Prometheus scraping.
  allowPrometheusScrape: true
  # Whether to allow kubelet probes.
  allowKubeletProbes: true
  # Additional NetworkPolicy egress rules appended verbatim.
  additionalEgress: []

# -----------------------------------------------------------------------------
# Pod Disruption Budget
# -----------------------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  # Keep at least one controller schedulable through voluntary disruption.
  minAvailable: 1
  # Alternatively set maxUnavailable; leave unset to use minAvailable.
  maxUnavailable: ""

# -----------------------------------------------------------------------------
# CRD Installation
# -----------------------------------------------------------------------------
crds:
  # Install CRDs as part of the Helm release.
  install: true
  # Keep CRDs when the Helm release is deleted.
  keep: true

# -----------------------------------------------------------------------------
# Extra labels applied to all resources.
# -----------------------------------------------------------------------------
commonLabels: {}

# -----------------------------------------------------------------------------
# Extra annotations applied to all resources.
# -----------------------------------------------------------------------------
commonAnnotations: {}

# -----------------------------------------------------------------------------
# Image pull secrets for private registries.
# -----------------------------------------------------------------------------
imagePullSecrets: []

# -----------------------------------------------------------------------------
# Override the release name.
# -----------------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""
