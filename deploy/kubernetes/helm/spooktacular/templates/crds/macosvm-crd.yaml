{{- if .Values.crds.install }}
# =============================================================================
# MacOSVM Custom Resource Definition
# =============================================================================
# Installed as part of the Spooktacular Helm chart. This CRD defines the
# MacOSVM resource type for managing macOS VMs via kubectl.
#
# Note: CRDs installed by Helm are NOT removed on `helm uninstall` by default
# to prevent accidental data loss. Set crds.keep=false to change this.
# =============================================================================

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: macosvms.spooktacular.app
  labels:
    {{- include "spooktacular.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.crds.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  group: spooktacular.app
  names:
    kind: MacOSVM
    listKind: MacOSVMList
    plural: macosvms
    singular: macosvm
    shortNames:
      - mvm
    categories:
      - spooktacular
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: MacOSVM declares a macOS virtual machine managed by Spooktacular.
          required:
            - spec
          properties:
            spec:
              type: object
              description: Desired state of the macOS VM.
              required:
                - sourceVM
              properties:
                sourceVM:
                  type: string
                  description: Name of the base VM or restore image to clone from.
                  minLength: 1
                  maxLength: 253
                cpu:
                  type: integer
                  description: Number of CPU cores to allocate.
                  default: 4
                  minimum: 2
                  maximum: 32
                memoryInGigabytes:
                  type: integer
                  description: RAM allocation in gigabytes.
                  default: 8
                  minimum: 4
                  maximum: 128
                diskInGigabytes:
                  type: integer
                  description: Disk size in gigabytes.
                  default: 64
                  minimum: 32
                  maximum: 2048
                network:
                  type: string
                  description: "Network mode: nat, bridged, or isolated."
                  default: nat
                  enum: [nat, bridged, isolated]
                provisioning:
                  type: object
                  description: How the VM is provisioned after cloning.
                  properties:
                    mode:
                      type: string
                      default: ssh
                      enum: [ssh, disk-inject]
                    script:
                      type: string
                      maxLength: 65536
                    user:
                      type: string
                      default: admin
                      maxLength: 63
                ephemeral:
                  type: boolean
                  description: Delete VM when stopped.
                  default: false
                nodeSelector:
                  type: object
                  description: Label selector for Mac node scheduling.
                  additionalProperties:
                    type: string
                  x-kubernetes-map-type: atomic
                template:
                  type: string
                  description: Named workload template.
                  enum: [github-runner, remote-desktop, openclaw]
                templateConfig:
                  type: object
                  description: Key-value configuration for the selected template.
                  properties:
                    repo:
                      type: string
                    token:
                      type: string
                    labels:
                      type: string
                    resolution:
                      type: string
                    runnerGroup:
                      type: string
                    secretRef:
                      type: string
            status:
              type: object
              description: Observed state of the macOS VM.
              properties:
                phase:
                  type: string
                  enum: [Pending, Creating, Running, Stopped, Failed, Terminating]
                ip:
                  type: string
                nodeName:
                  type: string
                message:
                  type: string
                lastTransitionTime:
                  type: string
                  format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: IP
          type: string
          jsonPath: .status.ip
        - name: Node
          type: string
          jsonPath: .status.nodeName
        - name: Source
          type: string
          jsonPath: .spec.sourceVM
          priority: 1
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
{{- end }}
