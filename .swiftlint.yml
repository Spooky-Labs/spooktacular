# SwiftLint configuration for Spooktacular
# Security-focused rules + code quality
#
# CI invokes `swiftlint --strict --config .swiftlint.yml`, which
# promotes every warning to an error. Every opt-in rule below
# therefore fails the build on a single hit. Keep this file
# tight — loosening a severity here loosens it fleet-wide.

included:
  - Sources
  - Tests

excluded:
  - .build
  - deploy

# Security rules
opt_in_rules:
  - force_unwrapping
  - force_cast
  - force_try
  - implicitly_unwrapped_optional
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - overridden_super_call
  - prohibited_super_call
  - raw_value_for_camel_cased_codable_enum
  - redundant_nil_coalescing
  - unowned_variable_capture
  - unused_capture_list
  - unused_declaration
  - unused_import
  - yoda_condition

disabled_rules:
  - line_length        # DocC comments can be long
  - function_body_length  # Some handlers are legitimately long
  - type_body_length   # Actor types with many methods
  - file_length        # Infrastructure files wrap frameworks

# Individual-rule severities — explicit rather than implicit so
# strict mode cannot silently change meaning across SwiftLint
# releases. Every memory-unsafety escape hatch is an ERROR.
force_cast:
  severity: error
force_try:
  severity: error
force_unwrapping:
  severity: error

# Custom rules — error-severity for patterns that bypass the
# typed shell/keychain abstractions.
custom_rules:
  raw_shell_execution:
    name: "Raw Shell Execution"
    regex: 'Process\(\)|executableURL.*bin/bash|executableURL.*bin/sh'
    message: "Raw shell execution detected. Use ProcessRunner or guest agent exec endpoint."
    severity: error
    included: "Sources/SpookCore/.*|Sources/SpookApplication/.*|Sources/SpookInfrastructureApple/(Entities|UseCases|Interfaces)/.*"

  plaintext_secret:
    name: "Plaintext Secret"
    regex: 'password.*=.*"[^"]+"|(api|auth).*token.*=.*"[^"]+"'
    message: "Possible plaintext secret. Store in the macOS Keychain and read via SecItemCopyMatching."
    severity: error

  force_http:
    name: "Force HTTP"
    regex: '"http://[^"]+'
    message: "Plain HTTP URL detected. Use HTTPS."
    severity: error
    excluded: "Tests/"
