# SwiftLint configuration for Spooktacular
# Security-focused rules + code quality
#
# CI invokes `swiftlint --strict --config .swiftlint.yml`, which
# promotes every warning to an error. Every opt-in rule below
# therefore fails the build on a single hit. Keep this file
# tight — loosening a severity here loosens it fleet-wide.

included:
  - Sources
  - Tests

excluded:
  - .build
  - deploy

# Opt-in rules beyond SwiftLint's default set.
#
# The memory-unsafety rules (`force_cast`, `force_try`,
# `force_unwrapping`) are enforced on PR *diffs* by Danger (see
# `Dangerfile` and the `:danger` fastlane lane) rather than
# baseline SwiftLint. That keeps the existing, demonstrably-safe
# force-unwraps (`UnicodeScalar(NSLeftArrowFunctionKey)!`,
# `MACAddress("00:11:22:33:44:55")!` after hex construction) from
# blocking PRs, while every new hit a contributor introduces still
# fails their check run. Strangler-pattern cleanup: existing
# violations get fixed incrementally; Danger keeps the line from
# moving backward.
opt_in_rules:
  - implicitly_unwrapped_optional
  - overridden_super_call
  - prohibited_super_call
  - raw_value_for_camel_cased_codable_enum
  - redundant_nil_coalescing
  - unowned_variable_capture
  # `unused_capture_list` was removed from SwiftLint ≥ 0.56;
  # keeping it in opt_in_rules emits "not a valid rule
  # identifier" warnings that Danger's `fail_on_errors: true`
  # flips into errors. Handling of redundant captures is now
  # folded into `unused_closure_parameter` + default rules.
  - yoda_condition

# `unused_declaration` and `unused_import` only fire under
# `swiftlint analyze`, not `swiftlint lint`. SwiftLint emits a
# "should be listed in 'analyzer_rules'" warning when they sit
# in opt_in_rules — warning that Danger's strict mode promotes
# to a build-failing error. Moving them here silences that
# warning without losing the rule; the `Lint` CI job would need
# to switch from `lint` to `analyze` to actually enforce them.
analyzer_rules:
  - unused_declaration
  - unused_import
  # Owns the "every public symbol has a docstring" quality
  # contract, previously enforced by DocC
  # `--warnings-as-errors`. SwiftLint catches this across every
  # target (SpookCore, SpookApplication, SpookInfrastructureApple,
  # SpooktacularKit, the executables, and every test helper
  # marked public) — a stricter cross-section than DocC's
  # per-target symbol graph ever enforced. See
  # https://realm.github.io/SwiftLint/missing_docs.html for
  # configuration options (`excludes_extensions: true`,
  # `evaluate_effective_access_control_level: false` by
  # default — both sensible).
  - missing_docs

disabled_rules:
  - line_length            # DocC comments can be long
  - function_body_length   # Some handlers are legitimately long
  - type_body_length       # Actor types with many methods
  - file_length            # Infrastructure files wrap frameworks
  # --- Enforced on PR diffs by Danger (see Dangerfile) ---
  #
  # These are default-enabled SwiftLint rules that we disable at
  # baseline because the existing codebase carries demonstrably-
  # safe uses (UnicodeScalar(NSLeftArrowFunctionKey)!,
  # MACAddress(hex)! after construction, etc.). Danger runs
  # danger-swiftlint with strict:true on changed files only, so
  # every newly-introduced force_cast / force_try fails the PR
  # check. Strangler-pattern: baseline stays passing; the line
  # never moves backward.
  - force_cast
  - force_try
  # --- Ergonomics, not quality signal ---
  #
  # Swift has no authoritative naming rule that rejects
  # `let x = ...`; the identifier_name default min_length 3
  # flags every cryptographic coordinate variable, every short
  # loop index, every single-letter match in a `guard let` —
  # none of which represent a real bug. Reviewers still catch
  # unclear names in PR review; SwiftLint was producing 300+
  # low-signal noise reports.
  - identifier_name
  # Swift 5.9+ allows trailing commas in collection literals
  # specifically because they make long fixture diffs cleaner.
  - trailing_comma
  # Nested types keep fixtures and helpers scoped to the
  # Suite/Test that uses them; third-level nesting is often
  # the clearest form.
  - nesting
  # A 5-tuple return type is fine for a match pattern or
  # test fixture; this would force premature struct creation.
  - large_tuple
  # Cyclomatic-complexity triggers on every real-world async
  # handler that needs a switch over N cases. Refactor when
  # review finds the complexity hard to read, not because a
  # counter says so.
  - cyclomatic_complexity
  # Opinionated: `[Int]?` is often exactly what the domain
  # models. When it isn't, code review catches it.
  - discouraged_optional_collection
  - discouraged_optional_boolean
  # A 5-parameter cap rejects legitimate builder initializers
  # (TestFlight metadata, HTTP request builders, SwiftUI view
  # modifiers). Reviewers still catch bloated signatures.
  - function_parameter_count
  # Orphaned doc comments — DocC's own warnings-as-errors check
  # in the `docs` CI job already catches undocumented public
  # symbols. SwiftLint's own rule flags a different pattern
  # (e.g., `///` followed by a blank line) that DocC handles
  # fine; leaving it on produces noise without quality signal.
  - orphaned_doc_comment

# Per-rule thresholds — non-default where we have a
# project-specific justification.
type_name:
  # CLI subcommand types (`IP`, `RBAC`) and C-interop type
  # aliases (`TC` for TLSConfiguration) are legitimately two
  # characters. SwiftLint's default min_length 3 produces noise
  # without quality signal.
  min_length: 2
  max_length: 50

# Custom rules — error-severity for patterns that bypass the
# typed shell/keychain abstractions.
#
# Every custom rule below scopes via `match_kinds` so docstrings,
# comments, and mark lines are NEVER matched. Without this scope
# the regexes trip on every README sentence that mentions
# "token" or every plist DOCTYPE that references Apple's
# canonical HTTP DTD URL.
custom_rules:
  raw_shell_execution:
    name: "Raw Shell Execution"
    regex: 'Process\(\)|executableURL.*bin/bash|executableURL.*bin/sh'
    match_kinds:
      - identifier
      - typeidentifier
      - string
    message: "Raw shell execution detected. Use ProcessRunner or guest agent exec endpoint."
    severity: error
    included: "Sources/SpooktacularCore/.*|Sources/SpooktacularApplication/.*|Sources/SpooktacularInfrastructureApple/(Entities|UseCases|Interfaces)/.*"

  plaintext_secret:
    name: "Plaintext Secret"
    # Require `let`/`var`/property-name containing a secret-like
    # identifier AND a string literal of ≥ 8 non-whitespace
    # characters. The `match_kinds` filter further restricts the
    # match to actual source tokens (not comments) so "auth
    # token" in a docstring no longer trips the rule.
    regex: '(?:let|var)\s+\w*(?i:password|secret|apikey|api_key|access_token|bearer)\w*\s*=\s*"[^"\s]{8,}"'
    match_kinds:
      - identifier
      - keyword
      - string
    message: "Possible plaintext secret. Store in the macOS Keychain and read via SecItemCopyMatching."
    severity: error
    # Tests legitimately declare `let secret = "..."` fixtures;
    # the rule exists to catch production code, not to noise-
    # flag every HMAC roundtrip test. Sources/ still enforces.
    excluded: "Tests/.*"

  force_http:
    name: "Force HTTP"
    regex: '"http://[^"]+'
    # Only scan actual string literals — not docstring
    # references to URLs, not comments, not DOCTYPE
    # declarations in plist generators that legitimately
    # reference Apple's canonical HTTP DTD URL.
    match_kinds:
      - string
    message: "Plain HTTP URL detected. Use HTTPS."
    severity: error
    # Every excluded file is a known plist DOCTYPE or a W3C
    # XML-signature identifier URL that the specification
    # requires verbatim (not a resource we actually fetch).
    # Apple's plist DTD must be served at
    # `http://www.apple.com/DTDs/PropertyList-1.0.dtd` per the
    # Core Foundation plist spec; W3C XML-dsig identifiers are
    # fixed strings in the XMLDSig standard.
    excluded: "Tests/.*|Sources/spooktacular-agent/LaunchDaemon\\.swift|Sources/SpooktacularApplication/ServicePlist\\.swift|Sources/SpooktacularInfrastructureApple/SAMLAssertionVerifier\\.swift|Sources/SpooktacularInfrastructureApple/XMLCanonicalization\\.swift|Sources/SpooktacularInfrastructureApple/DiskInjector\\.swift|Sources/SpooktacularInfrastructureApple/SharedFolderProvisioner\\.swift"
